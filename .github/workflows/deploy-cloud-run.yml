name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Cloud Run region"
        required: true
        default: "asia-northeast1"
      service:
        description: "Cloud Run service name"
        required: true
        default: "a2a-agent-marketplace"
      repository:
        description: "Artifact Registry repository"
        required: true
        default: "cloud-run-source-deploy"
      gemini_secret:
        description: "Secret Manager secret name for GEMINI_API_KEY"
        required: true
        default: "gemini-api-key-a2a-marketplace"
      target_url:
        description: "Public Cloud Run URL to verify after deploy"
        required: true
        default: "https://a2a-agent-marketplace-xhdqpudx6a-an.a.run.app"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Cloud Build deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight deploy secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for name in GCP_PROJECT_ID GCP_WORKLOAD_IDENTITY_PROVIDER GCP_DEPLOY_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deploy secret::${name} is required for Deploy Cloud Run."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --substitutions _REGION=${{ inputs.region }},_SERVICE=${{ inputs.service }},_REPOSITORY=${{ inputs.repository }},_GEMINI_SECRET=${{ inputs.gemini_secret }}

      - name: Verify public proof surface
        run: |
          set -euo pipefail
          target="${{ inputs.target_url }}"
          curl -fsSL "${target}/api/healthz"
          curl -fsSL "${target}/.well-known/agent-card.json" | jq -e '
            (.skills | length) >= 40 and
            any(.skills[]; .id == "competitive.decision-matrix" and ((.tags // []) | index("decision-matrix-lock"))) and
            any(.skills[]; .id == "judge.first-click-smoke" and ((.tags // []) | index("first-click-smoke-lock"))) and
            any(.skills[]; .id == "submission.dossier" and ((.tags // []) | index("submission-dossier-lock")))
          '
          curl -fsSL "${target}/win-autopilot" | grep -E 'Win Autopilot Proof'
          curl -fsSL "${target}/winner-sufficiency" | grep -E 'Winner Sufficiency Lock'
          curl -fsSL "${target}/observability-oracle" | grep -E 'Observability Oracle Proof'
          curl -fsSL "${target}/competitive-decision-matrix" | grep -E 'Competitive Decision Matrix|Head-to-Head Matrix'
          curl -fsSL "${target}/first-click-smoke" | grep -E 'First-Click Smoke Lock'
          curl -fsSL "${target}/api/first-click-smoke" | jq -e '.readiness == "smoke-passed" and .missingCount == 0 and .passedCount >= 14'
          curl -fsSL "${target}/publisher" | grep -E 'Submission Publisher Proof|ProtoPedia Quality Lock'
          curl -fsSL "${target}/dossier" | grep -E 'Submission Dossier Proof|Handoff Packet'
          curl -fsSL -X POST "${target}/a2a" \
            -H 'Content-Type: application/json' \
            --data '{"method":"message/send","params":{"text":"A2A Cloud Run Gemini DevOps"}}' \
            | jq -e '.result.artifacts[0].parts[0].data | .competitiveDecisionMatrixPageEndpoint and .firstClickSmokePageEndpoint and .publisherPageEndpoint and .dossierPageEndpoint'
