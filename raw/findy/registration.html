より賞金等の受領に制限がある職務に就く者は参加できません 。\n3. 参加者は、本イベントの登録にあたって、当社規定のコンプライアンスチェックの実施、および賞金の振込口座名義との照合のため、必ず本名（フルネーム・漢字）で登録するものとし、ニックネーム等での登録は行わないものとします。チームで参加する場合も、チームを構成する参加者全員が個別に本条に基づく登録を行う必要があります。\n4. 参加者は、登録情報に変更が生じた場合、速やかに当社に届け出るものとします。登録情報に虚偽、誤り、または記載漏れがあったことにより参加者に生じた損害について、当社は一切の責任を負いません。\n5. 当社は、参加登録をしたものが以下の各号のいずれかに該当すると判断した場合、参加を承認せず、また賞金の支払いを行わないことができるものとします。なお、当社はその理由について一切開示義務を負わないものとします。\n- 本条第1項から第3項の資格・義務を満たさない場合\n- 登録情報に虚偽、誤り、または入力漏れがある場合\n- 反社会的勢力等である、またはその疑いがあると当社が判断した場合\n- その他、当社が合理的に不適切と判断した場合\n6. 登録情報に虚偽があった場合、または本規約の規定に違反したことが判明した場合、当社は当該参加者の参加資格を取り消し、賞金の授与を行わないものとします。既に賞金を授与している場合には、当社は当該賞金の返還を請求できるものとします。\n\n#### 第4条 （参加者の責任）\n1. 参加者は、登録情報に誤りを発見した場合または変更が生じた場合、ただちに登録情報を当社所定の方法により修正または変更するものとします。登録情報の不備・齟齬により発生した事項については、当社は、当社の故意又は重過失による場合を除き、一切責任を負いません。\n2. 参加者は本イベントで利用するアカウントを自らの責任において管理および保管するものとし、これを第三者に利用させ、これを第三者に供与、貸与もしくは譲渡し、またはこれを第三者との間で名義変更または売買等をしてはならないものとします。3. また、本アカウント等が盗まれ、またはアカウントが第三者に不正に使用されていることが判明した場合、ただちにその旨を当社に通知するとともに、当社からの指示に従うものとします。\n4. 本イベントの参加にあたって第三者（本イベントの他参加者を含みます）との間で紛争を生じた場合、参加者は、自己の責任と費用をもって処理ならびに解決するものとします。\n5. 参加者は、当社または第三者に対して損害を与えないよう善良な管理者の注意義務をもって本イベントに参加するものとします。本イベントの参加にあたって参加者が当社または第三者に対して損害を与えた場合、当社または第三者が被った一切の損害（当社において紛争の解決のために費用を支出した場合、当該費用を含みます。）を賠償するものとします。\n\n#### 第5条 （参加者登録の抹消）\n1. 参加者は、当社所定の方法によって当社に申請することにより、参加者登録およびアカウントを抹消することができます。\n2. 参加者が次の各号のいずれかに該当する場合、当社は、当該参加者に対する催告なく、当社は当該参加者について参加者登録およびアカウントを抹消することができます。\n- 第３条定める参加資格を満たさないことが判明した場合。\n- 登録情報に虚偽、誤り、または記載漏れがあった場合。\n- 反社会的勢力等（暴力団、暴力団員、右翼団体、反社会的勢力、その他これに準ずるもの）である、または反社会的勢力等と何かしらの交流若しくは関与を行っていると当社が判断した場合。\n- 本規約に違反する行為がなされ、当社からの勧告によっても是正されない場合。\nその他、当社において参加者登録が不適切と判断した場合。\n3. その理由にかかわらず参加者登録が抹消された場合、参加者は、参加者に関するデータについて一切の権利を放棄し、当社の裁量によって削除、保存または利用すること、また当社に対して開示もしくは訂正等を求めることができないことについてあらかじめ同意します。ただし、参加者の個人情報については本規約、当社が定めるプライバシーポリシーおよび法令に従って取り扱われるものとします。\n\n#### 第6条 （秘密保持義務）\n参加者は、本イベントに関連して知得した非公開情報（技術情報、審査過程、審査結果、他の参加者の情報、並びに当社またはスポンサー企業から提供された課題の内容、提供データ、クーポンコード、アカウント、有償ツールの利用権限等）を第三者に開示または漏洩してはなりません。\n\n#### 第7条 （個人情報の取り扱い）\n1. 当社は、本イベントに関連して取得した参加者の個人情報（氏名、フリガナ、勤務先、所属部署、役職、業種、従業員規模、メールアドレス、電話番号、キャリア年数、技術スタック、利用メディア、プロフィール画像、提出された本成果物、本イベントにおける活動履歴その他申込時に取得する情報）および提出された本成果物を、以下の目的で利用します。\n- 本イベントに関する事項のご連絡のため。\n- 本イベントの効果測定、改善のために行うアンケート送付のため。\n- 当社およびスポンサー企業の採用活動、最新トレンドのご連絡、商品・サービス・イベント等のマーケティング活動に関するご連絡のため。\n- いただいたお問い合わせへ回答するため。\n- 本イベントの運営管理、次回開催のご案内のため。\n- 当社およびスポンサー企業によるご案内のため。\n\n2. 当社は、本イベントの運営のため、以下の第三者に対し、前項の情報の全部または一部を提供することがあります。参加者はこれにあらかじめ同意するものとします。\n- 運営支援パートナー（一般社団法人 MA）：運営業務の遂行、Proto Pedia の運用\n- スポンサー企業：スポンサープランに応じたリード提供、採用活動、マーケティング活動\n- 審査員：審査業務の遂行\n\n#### 第8条 （チーム参加）\n1. チームで参加する場合、参加者は代表者を１名定めるものとします。\n2. 代表者はチームを構成する参加者全員に本規約を遵守させる責任を負い、チームを構成する参加者のいずれかによる規約違反はチーム全体の違反とみなします。\n3. 当社から代表者に対して行われた連絡および賞金の支払いは、チームを構成する参加者全員に対して行われたものとみなします。\n\n#### 第9条 （賞金）\n1. 当社は、本イベントで入賞した参加者に対し、賞金を支払います。\n2. チームが入賞した場合、その賞金は、チームの代表者１名の指定口座に対し一括して支払うものとし、チーム内での分配等について当社は一切関与せず、責任を負いません。\n3. 賞金の支払いは2026年8月末日（予定）とし、参加者は受領にあたり必要な手続きに協力するものとします。\n\n#### 第10条 （本成果物の知的財産権等）\n1. 本成果物に関する知的財産権（著作権法第27条および第28条の権利を含みます。）は、当該参加者に帰属します。\n2. 参加者は、当社および本イベントのスポンサーに対し、本イベントの運営・結果発表、および広報（開催レポート、プレスリリース、SNS等への掲載）の目的に限り、本成果物ならびに本イベントにおける参加者の氏名、肖像、音声、映像、発表内容およびインタビュー・コメント等を無償かつ無制限で利用（複製、翻案、編集、配信、公衆送信等）することを許諾するものとします。\n\n#### 第11条 （禁止事項）\n参加者は本イベントに参加するにあたって、以下の行為を行ってはならないものとします。\n1. 当社および第三者の著作権、商標権等の知的財産権、肖像権等の人格権その他法律上の権利もしくは保護に値する利益を侵害する行為、または侵害するおそれのある行為。\n2. 当社および第三者の名誉の侵害、特定の個人や団体を誹謗中傷する行為。あるいは第三者に不快感を与える行為。\n3. 本規約、法令、条例、公序良俗に違反する行為、または違反するおそれのある行為。あるいはこれらに違反する行為を助長するおそれのある行為。\n4. 本イベントに関連し、以下に該当し、または該当すると当社が合理的に判断する情報を当社または他の参加者に送信する行為。\n- 暴力的または残虐な表現を含む情報\n- コンピューター・ウィルスその他の有害なコンピューター・プログラムを含む情報\n当社、本イベントの他の参加者およびその他の第三者の名誉または信用を毀損する表現を含む情報\n- わいせつな表現を含む情報\n- 差別を助長する表現を含む情報\n- 自殺、自傷行為を助長する表現を含む情報\n- 薬物の不適切な利用を助長する表現を含む情報\n- 反社会的な表現を含む情報\n- チェーンメール等の第三者への情報の拡散を求める情報\n- 上記①から⑨までの他、他人に不快感を与える表現を含む情報\n5. 第三者のメールアドレスを用いて本イベントに関連する当社システム等を利用する行為。\n6. プロフィールその他の本イベントの登録に伴い当社に開示する情報について、虚偽または不正確な情報を開示する行為。\n7. 本イベントに参加する権利の一部または全部を商用または営利目的で第三者に提供する行為。\n8. 本イベント専用のアカウントを第三者に利用させる行為。\n9. 本イベントの運営において使用するサーバに過度な負荷をかける行為、または過度な負荷がかかるおそれのある行為。\n10. 本イベントに関連して提供されるソフトウェア等に対するリバースエンジニアリング、逆コンパイル、逆アセンブル、スクレイピングおよびその他方法、態様の如何を問わず解析する行為。\n11. 当社が表示する広告を不正に移動、改変、削除または不正表示させる行為。\n12. 無限連鎖講（ねずみ講）、ネットワーク・ビジネスの勧誘を目的として本イベントの場を利用する行為。\n13. 本規約に基づき当社に報告または開示する情報について、虚偽または不正確な情報を報告または開示する行為。\n14. 当社の承諾を得ずに、本イベントと同様の企画を提供する行為。\n15. 前各号の行為を直接または間接に惹起し、または容易にする行為。\n16. 本イベントの参加者のみが閲覧可能であるウェブページ等を第三者に閲覧させる行為。\n17. 当社システムに対する不正アクセス行為。\n18. 当社またはスポンサー企業が提供するクーポンコード、アカウント、有償ツールの利用権限等を、第三者に譲渡、転売または開示する行為。\n19. 本イベントの他の参加者に対し、不適切な接触、引き抜き、ハラスメント、勧誘等を行う行為。\n20. その他、当社が不適切と合理的に判断する行為。\n\n#### 第12条 （権利義務の譲渡等の禁止）\n参加者は、当社が別途定める方法により、当社の事前の承諾を得ないかぎり、第三者に対し、本イベントにかかる契約上の地位、権利および義務について、これを譲渡し、継承させ、または担保に供してはならないものとします。\n\n#### 第13条 （本イベントに関する知的財産権）\n1. 本イベントに関する特許、実用新案登録、意匠登録を受ける権利その他登録を受ける権利および特許権、実用新案権、意匠権、著作権、商標権その他の法律上保護される権利ならびに秘匿可能な財産的価値のある技術情報（ノウハウ等）その他一切の知的財産権は、当社または当社に使用を許諾した第三者に帰属し、本規約に定める場合を除き、参加者に使用を許諾するものではありません。\n2. 参加者は、当社の事前の書面による承諾なく、本成果物を一般に公表（GitHub等での公開を含みます）してはならないものとします。ただし、以下の各号のいずれかに該当する場合はこの限りではありません。\n（1）当社が指定する Proto Pedia その他の外部プラットフォームへの投稿\n（2）本イベントの運営・審査・結果発表の過程における公開\n（3）一次審査通過後の、当社が別途指定する方法・媒体での公開\n（4）当社の事前の書面による承諾を得た場合\n3. 本成果物について、本イベントのスポンサー企業から知的財産権の譲渡またはライセンス許諾の希望があった場合、参加者は当該スポンサー企業と誠実に協議を行うものとします。\n\n#### 第14条 （本イベントの中断）\n当社は、本イベントについて、以下の各号のいずれかの事由が発生した場合、参加者に事前に通知することなく、当該事由の解消に至るまで、本イベントの全部もしくは一部を中断することができるものとします。\n1. 通信環境の障害、天災、火災、ストライキ、洪水、疫病、暴動、戦争、テロ行為など、またはそれらに関連する要因により、本イベントの全部または一部の提供が困難になった場合。\n2. 第三者による不正アクセス、情報漏洩その他情報セキュリティ上の問題が生じた場合、またはそのおそれがある場合。\n3. 改善、維持または管理のため必要な場合。\n4. 用いるサーバーコンピュータ等において、システム処理能力を超える負荷が生じるなどして本イベントの正常な提供が困難になった場合、またはそのおそれがある場合。\n5. 第三者による権利主張があった場合。\n\n#### 第15条 （免責）\n1. 当社は、本イベントの運営にあたり、参加者に対し、本成果物の正確性、完全性、有用性、および第三者の権利を侵害していないこと等について、何ら保証しないものとします。\n2. 当社は、当社の故意または重過失による場合を除き、本イベントの運営または参加者同士もしくは第三者とのトラブルに関連して参加者に生じたいかなる損害についても、賠償する責任を負わないものとします。\n3. 参加者が本イベントへの参加に関連して第三者の権利を侵害した場合、参加者は自己の責任と費用において解決するものとし、当社は一切責任を負いません。\n\n#### 第16条 （反社会的勢力の排除）\n1. 参加者は、当社に対し、自己が、現在、暴力団、暴力団員、暴力団員でなくなった時から５年を経過しない者、暴力団準構成員、暴力団関係企業、総会屋等、社会運動等標ぼうゴロまたは特殊知能暴力集団等、その他これらに準ずる者（以下「暴力団員等」という。）に該当しないこと、および次の各号のいずれにも該当しないことを表明し、かつ将来にわたっても該当しないことを確約します。\n- 暴力団員等が経営を支配、または経営に実質的に関与していると認められる関係を有すること。\n- 不当に暴力団員等を利用していると認められる関係を有すること。\n- 暴力団員等に対して資金等を提供し、または便宜を供与するなどの関与をしていると認められる関係を有すること。\n- 役員または経営に実質的に関与している者が暴力団員等と社会的に非難されるべき関係を有すること。\n2. 参加者は、自らまたは第三者を利用して次の各号に該当する行為を行わないことを確約します。\n- 暴力的な要求行為、または法的な責任を超えた不当な要求行為。\n- 取引に関して、脅迫的な言動をし、または暴力を用いる行為。\n- 風説を流布し、偽計を用いまたは威力を用いて当社の信用を毀損し、または当社の業務を妨害する行為。\n3. 当社は、参加者が前各項の確約に反し、または反していると合理的に疑われる場合、催告その他何らの手続きを要することなく、直ちに当該参加者の登録を抹消し、本イベントへの参加を禁止（会場からの退場、賞金の剥奪および返還請求等を含みます）することができるものとします。なお、当社はかかる判断の根拠を説明する義務を負わず、これにより参加者に損害が生じても一切の責任を負いません。\n4. 本規約に定めのない事項については、第1条に定める共通規約の規定が適用されるものとします。\n\n#### 第17条 （存続条項）\n本規約第５条第２項、第６条、第7条、第10条、第13条、第15条および第16条の各規定は、本イベント終了後又は参加登録の抹消後も有効に存続するものとします。\n\n#### 第18条 （共通事項）\n1. 本規約に明示的な定めのない事項（規約変更、反社会的勢力の排除、分離可能性、準拠法および合意管轄等）については、「Findy Tools 利用規約 / Findy Conference 利用規約 （ユーザー向け）」の規定が適用されるものとします。\n2. 当社は、参加者が反社会的勢力等に該当する場合、または本規約の各条項のいずれかに違反した場合、第1条に定める共通規約の規定にかかわらず、本規約に基づく措置（登録抹消、本イベント会場からの退場、賞金の剝奪等）を優先して適用できるものとします。"])</script><script>self.__next_f.push([1,"18:Td08,"])</script><script>self.__next_f.push([1,"#### 1. 当社は、本イベントに関連して取得した参加者の個人情報（氏名、フリガナ、勤務先、所属部署、役職、業種、従業員規模、メールアドレス、電話番号、キャリア年数、技術スタック、利用メディア、プロフィール画像、提出された本成果物、本イベントにおける活動履歴その他申込時に取得する情報）および提出された本成果物を、以下の目的で利用します。\n- 本イベントに関する事項のご連絡のため。\n- 本イベントの効果測定、改善のために行うアンケート送付のため。\n- 当社およびスポンサー企業の採用活動、最新トレンドのご連絡、商品・サービス・イベント等のマーケティング活動に関するご連絡のため。\n- いただいたお問い合わせへ回答するため。\n- 本イベントの運営管理、次回開催のご案内のため。\n- 当社およびスポンサー企業によるご案内のため。\n\n#### 2. 当社は、本イベントの運営のため、以下の第三者に対し、前項の情報の全部または一部を提供することがあります。参加者はこれにあらかじめ同意するものとします。\n- 運営支援パートナー（一般社団法人 MA）：運営業務の遂行、Proto Pedia の運用\n- スポンサー企業：スポンサープランに応じたリード提供、採用活動、マーケティング活動\n- 審査員：審査業務の遂行\n\n#### 3. 個人情報は、メールまたはビジネスチャットツール等の安全な手段により、必要な範囲で共有いたします。\n\n#### 4. 当社のプライバシーポリシーは[こちら](https://findy.co.jp/privacy/)になります。\n\n#### 5. 主催者は、スポンサー企業各社へ以下の情報を提供します。\n氏名、フリガナ、勤務先、所属部署、役職、業種、従業員規模、メールアドレス、電話番号、キャリア年数、技術スタック、利用メディア、プロフィール画像、提出された本成果物、本イベントにおける活動履歴その他申込時に取得する情報）および提出された
